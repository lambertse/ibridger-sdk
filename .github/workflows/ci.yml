name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── C++ build and unit tests ───────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DIBRIDGER_BUILD_TESTS=ON
          -DIBRIDGER_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  # ─── JavaScript SDK unit tests ───────────────────────────────────────────────
  js-sdk:
    name: JS SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        working-directory: sdk/js
        run: npm ci

      - name: Build
        working-directory: sdk/js
        run: npm run build

      - name: Test
        working-directory: sdk/js
        run: npm test

  # ─── Cross-language integration tests ────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [cpp, js-sdk]

    steps:
      - uses: actions/checkout@v4

      # Build the C++ echo_server binary (needed by integration test helper)
      - name: Configure and build C++
        run: |
          cmake -B build \
            -DIBRIDGER_BUILD_TESTS=ON \
            -DIBRIDGER_BUILD_EXAMPLES=ON
          cmake --build build --parallel

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # JS SDK must be installed — ts-node runs the JS echo server
      - name: Install JS SDK dependencies
        working-directory: sdk/js
        run: npm ci

      - name: Install integration test dependencies
        working-directory: tests/integration
        run: npm ci

      - name: Run integration tests
        working-directory: tests/integration
        run: npm test
